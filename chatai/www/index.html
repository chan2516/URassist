<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URassist</title>

    <link rel="shortcut icon" href="assests/img/logo.ico" type="image/x-icon">

    <!-- Bootsrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- Bootsrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Particle js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/modernizr/2.8.3/modernizr.min.js"
        type="text/javascript"></script>

    <!-- Texllate  -->
    <link rel="stylesheet" href="assests/vendore/texllate/animate.css">

    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div id="bg"></div>
    <div class="container">



        <section id="Oval" class="mb-4">

            <div class="row">
                <div class="col-md-1"></div>
                <div class="col-md-10">
                    <div class="d-flex justify-content-center align-items-center" style="height: 80vh;">

                        <canvas id="canvasOne" width="700" height="420" style="position: absolute;"></canvas>

                        <div id="JarvisHood">

                            <div class="square">
                                <span class="circle"></span>
                                <span class="circle"></span>
                                <span class="circle"></span>
                                
                                
                            </div>

                        </div>

                    </div>
                    <h5 class="text-light text text-center">Hello! How can I help you today?</h5>

                    <div class="col-md-12 mt-4 ">
                        <div class="text-center">
                            <div id="TextInput" class="d-flex">

                                <input type="text" class="input-field" name="chatbox" id="chatbox"
                                    placeholder="type here ... ">
                                <button id="SendBtn" class="glow-on-hover" hidden><i class="bi bi-send"></i></button>
                                <button id="MicBtn" class="glow-on-hover"><i class="bi bi-mic"></i></button>
                                <button id="StopBtn" class="glow-on-hover stop-control"><i class="bi bi-stop-fill"></i></button>
                                <button id="ChatBtn" class="glow-on-hover" data-bs-toggle="offcanvas" data-bs-target="#offcanvasScrolling" aria-controls="offcanvasScrolling"><i class="bi bi-chat-dots"></i></button>
                                <button id="SettingsBtn" class="glow-on-hover"><i class="bi bi-gear"></i></button>

                            </div>
                        </div>
                    </div>

                </div>
                <div class="col-md-1"></div>
            </div>

        </section>

        <section id="SiriWave" class="mb-4" hidden>

            <div class="container">
                <div class="row">
                    <div class="col-md-12">
                        <div class="d-flex justify-content-center align-items-center" style="height: 100vh;">
                            <div class="">
                                <p class="text-start text-light mb-4 siri-message" style="font-size: 28px;">Hello, I am J.A.R.V.I.S</p>
                                <div id="siri-container"></div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>

        </section>
    </div>

    <div class="offcanvas offcanvas-start chat-canvas" data-bs-scroll="true" data-bs-backdrop="false" tabindex="-1"
        id="offcanvasScrolling" aria-labelledby="offcanvasScrollingLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title text-white" id="offcanvasScrollingLabel">Chats</h5>
            <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div id="chat-canvas-body" class="offcanvas-body">

        </div>
    </div>

    <div id="settings-overlay" class="settings-overlay"></div>
    <aside id="settings-pane" class="settings-drawer" aria-hidden="true">
        <div class="drawer-header">
            <h2>Command Settings</h2>
            <button id="close-btn" class="icon-btn" type="button" aria-label="Close settings">&times;</button>
        </div>

        <div class="drawer-content">
            <section class="card-section">
                <h3>AI & Voice</h3>
                <label class="settings-label" for="new-provider">Add New API Key</label>
                <select id="new-provider" class="settings-input">
                    <option value="gemini">Gemini</option>
                    <option value="openrouter">OpenRouter</option>
                    <option value="groq">Groq</option>
                </select>

                <label class="settings-label" for="new-provider-key">API Key</label>
                <input type="password" id="new-provider-key" class="settings-input" placeholder="Paste provider API key">

                <label class="settings-label" for="new-provider-model">Model</label>
                <input type="text" id="new-provider-model" class="settings-input" placeholder="Example: gemini-1.5-flash">

                <button id="save-provider-btn" class="add-btn" type="button">Add / Update Provider Key</button>

                <label class="settings-label" for="ai-provider">Selected Provider (saved providers only)</label>
                <select id="ai-provider" class="settings-input">
                    <option value="">Default Web Search</option>
                </select>

                <ul id="provider-list" class="command-list"></ul>

                <label class="settings-label" for="speech-rate">Voice Speed: <span id="speech-rate-value">175</span></label>
                <input type="range" id="speech-rate" class="settings-range" min="130" max="230" step="5" value="175">

                <label class="settings-label" for="mic-device">Microphone Input</label>
                <select id="mic-device" class="settings-input">
                    <option value="-1">System Default</option>
                </select>

                <button id="save-settings-btn" class="add-btn" type="button">Save AI/Voice Settings</button>
                <p id="settings-save-status" class="settings-hint"></p>
            </section>

            <section class="card-section">
                <h3>Web Command</h3>
                <input type="text" id="web-name" class="settings-input" placeholder="Name">
                <input type="text" id="web-address" class="settings-input" placeholder="https://example.com/">
                <button class="add-btn" onclick="addCommand('web')">Add</button>
                <ul id="web-list" class="command-list"></ul>
            </section>

            <section class="card-section">
                <h3>System Command</h3>
                <input type="text" id="system-name" class="settings-input" placeholder="Name">
                <input type="text" id="system-address" class="settings-input" placeholder="C:\\folder\\exam\\example.exe">
                <button class="add-btn" onclick="addCommand('system')">Add</button>
                <ul id="system-list" class="command-list"></ul>
            </section>
        </div>
    </aside>
    

    <!--Jquery  -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <!-- Particle js -->
    <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js'></script>
    <script src='https://ajax.googleapis.com/ajax/libs/jqueryui/1.11.2/jquery-ui.min.js'></script>
    <script src="script.js"></script>

    <!-- Siri wave -->
    <script src="https://unpkg.com/siriwave/dist/siriwave.umd.min.js"></script>

    <!-- Texllate js -->
    <script src="assests/vendore/texllate/jquery.fittext.js"></script>
    <script src="assests/vendore/texllate/jquery.lettering.js"></script>
    <script src="http://jschr.github.io/textillate/jquery.textillate.js"></script>

    <script src="main.js"></script>
    <script src="controller.js"></script>
    <script src="/eel.js"></script>
    <script src="particles.min.js"></script>
    <script src="custom.js"></script>


</body>

</html>
